<h1 id="dbt-test%E3%81%A8%E3%81%AF%E4%BD%95%E3%81%8B-1">dbt testとは何か</h1>

<li>0行返る → テストパス（問題なし）</li>
<li>1行以上返る → テストフェイル（問題あり）</li>
</ul>

<header>dbt test 完全ガイド</header>
<h1 id="%E3%81%AA%E3%81%9Csnowflake%E3%83%A6%E3%83%BC%E3%82%B6%E3%83%BC%E3%81%ABdbt-test%E3%81%8C%E5%BF%85%E8%A6%81%E3%81%8B">なぜSnowflakeユーザーにdbt testが必要か</h1>
<p>Snowflakeでは制約（PRIMARY KEY, FOREIGN KEY, UNIQUE）を定義できるが、NOT NULL以外は <strong>強制されない</strong> 。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Snowflakeでこう定義しても...</span>
<span class="hljs-keyword">CREATE TABLE</span> orders (
  order_id <span class="hljs-type">INT</span> <span class="hljs-keyword">PRIMARY KEY</span>,
  customer_id <span class="hljs-type">INT</span> <span class="hljs-keyword">REFERENCES</span> customers(customer_id)
);

<span class="hljs-comment">-- 重複したorder_idをINSERTしてもエラーにならない！</span>
<span class="hljs-keyword">INSERT INTO</span> orders <span class="hljs-keyword">VALUES</span> (<span class="hljs-number">1</span>, <span class="hljs-number">100</span>), (<span class="hljs-number">1</span>, <span class="hljs-number">200</span>);  <span class="hljs-comment">-- 成功してしまう</span>
</code></pre>
<p>dbt testがこのギャップを埋める。</p>
</section>

<h1 id="%E7%B5%84%E3%81%BF%E8%BE%BC%E3%81%BFgeneric-tests--%E6%A6%82%E8%A6%81">組み込みGeneric tests — 概要</h1>

</tr>
<tr>
<td><code>not_null</code></td>
<td>カラムにNULLが含まれていないか</td>
</tr>
<tr>

<tr>

</table>

<h1 id="%E7%B5%84%E3%81%BF%E8%BE%BC%E3%81%BFgeneric-test-%E2%91%A0-unique">組み込みGeneric test ①: unique</h1>
<p>カラムの全値がユニーク（重複なし）であることを検証する。</p>
<div class="columns"><div>
<div class="col-label">YAMLでの定義</div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">columns:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">order_id</span>
    <span class="hljs-attr">data_tests:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-string">unique</span>
</code></pre>
</div><div>
<div class="col-label">dbtが生成する実際のSQL</div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span>
  order_id <span class="hljs-keyword">AS</span> unique_field,
  <span class="hljs-built_in">COUNT</span>(<span class="hljs-operator">*</span>) <span class="hljs-keyword">AS</span> n_records
<span class="hljs-keyword">FROM</span> analytics.stg_orders
<span class="hljs-keyword">WHERE</span> order_id <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NOT NULL</span>
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> order_id
<span class="hljs-keyword">HAVING</span> <span class="hljs-built_in">COUNT</span>(<span class="hljs-operator">*</span>) <span class="hljs-operator">&gt;</span> <span class="hljs-number">1</span>
</code></pre>
</div></div>
<p>主キーの検証に必須。Snowflakeが強制しないUNIQUE制約の代わりになる。</p>
</section>

<div class="columns"><div>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> status <span class="hljs-keyword">AS</span> value_field,

<h1 id="%E7%B5%84%E3%81%BF%E8%BE%BC%E3%81%BFgeneric-test-%E2%91%A3-relationships">組み込みGeneric test ④: relationships</h1>
<p>あるカラムの全値が、別テーブルの参照カラムに存在することを検証する（参照整合性チェック）。</p>
<div class="columns"><div>
<div class="col-label">YAMLでの定義</div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">columns:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
    <span class="hljs-attr">data_tests:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">relationships:</span>
          <span class="hljs-attr">to:</span> <span class="hljs-string">ref(&#x27;stg_customers&#x27;)</span>
          <span class="hljs-attr">field:</span> <span class="hljs-string">customer_id</span>
</code></pre>
</div><div>
<div class="col-label">dbtが生成する実際のSQL</div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> o.customer_id <span class="hljs-keyword">AS</span> id
<span class="hljs-keyword">FROM</span> analytics.stg_orders <span class="hljs-keyword">AS</span> o
<span class="hljs-keyword">LEFT</span> <span class="hljs-keyword">JOIN</span> analytics.stg_customers <span class="hljs-keyword">AS</span> c
  <span class="hljs-keyword">ON</span> o.customer_id <span class="hljs-operator">=</span> c.customer_id
<span class="hljs-keyword">WHERE</span> o.customer_id <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NOT NULL</span>
  <span class="hljs-keyword">AND</span> c.customer_id <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NULL</span>
</code></pre>
</div></div>
<p>Snowflakeが強制しないFOREIGN KEY制約の実質的な代替。</p>

<h1 id="singular-tests--%E6%A6%82%E8%A6%81">Singular tests — 概要</h1>
<p><code>tests/</code> ディレクトリにSQLファイルを置くだけで、テストとして認識される。</p>
<p>特徴：</p>
<ul>
<li>YAMLの宣言ではなく、自由にSQLを記述する</li>
<li>複数テーブルをJOINした複雑な検証ができる</li>
<li>プロジェクト固有のビジネスルールの検証に向いている</li>
<li>「結果が0行ならパス」というルールはGeneric testと同じ</li>
</ul>
</section>

<h1 id="singular-tests--%E4%BE%8B%E2%91%A1-%E3%83%86%E3%83%BC%E3%83%96%E3%83%AB%E9%96%93%E3%81%AE%E6%95%B4%E5%90%88%E6%80%A7%E3%83%81%E3%82%A7%E3%83%83%E3%82%AF">Singular tests — 例②: テーブル間の整合性チェック</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- tests/assert_order_amount_matches_products.sql</span>
<span class="hljs-comment">-- 注文金額が商品の合計金額と一致することを確認する</span>
<span class="hljs-keyword">SELECT</span>
  o.order_id,
  o.amount <span class="hljs-keyword">AS</span> order_amount,
  <span class="hljs-built_in">SUM</span>(p.price) <span class="hljs-keyword">AS</span> product_total
<span class="hljs-keyword">FROM</span> {{ <span class="hljs-keyword">ref</span>(<span class="hljs-string">&#x27;stg_orders&#x27;</span>) }} <span class="hljs-keyword">AS</span> o
<span class="hljs-keyword">JOIN</span> {{ <span class="hljs-keyword">ref</span>(<span class="hljs-string">&#x27;order_items&#x27;</span>) }} <span class="hljs-keyword">AS</span> oi
  <span class="hljs-keyword">ON</span> o.order_id <span class="hljs-operator">=</span> oi.order_id
<span class="hljs-keyword">JOIN</span> {{ <span class="hljs-keyword">ref</span>(<span class="hljs-string">&#x27;stg_products&#x27;</span>) }} <span class="hljs-keyword">AS</span> p
  <span class="hljs-keyword">ON</span> oi.product_id <span class="hljs-operator">=</span> p.product_id
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> o.order_id, o.amount
<span class="hljs-keyword">HAVING</span> o.amount <span class="hljs-operator">!=</span> <span class="hljs-built_in">SUM</span>(p.price)
</code></pre>
<p>複数テーブルをJOINする複雑なビジネスルールは、Singular testが適している。</p>

<h1 id="%E3%83%86%E3%82%B9%E3%83%88%E8%A8%AD%E5%AE%9A--%E9%96%BE%E5%80%A4%E3%81%AB%E3%82%88%E3%82%8B%E5%88%B6%E5%BE%A1">テスト設定 — 閾値による制御</h1>
<p>失敗行数に応じて挙動を変えられる。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">columns:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">order_id</span>

      <span class="hljs-bullet">-</span> <span class="hljs-attr">unique:</span>

            <span class="hljs-attr">severity:</span> <span class="hljs-string">error</span>

</ul>

<header>dbt test 完全ガイド</header>
<h1 id="snowflake%E5%9B%BA%E6%9C%89%E3%81%AE%E8%80%83%E6%85%AE%E4%BA%8B%E9%A0%85-1">Snowflake固有の考慮事項</h1>
<h2 id="%E3%83%86%E3%82%B9%E3%83%88--sql%E3%82%AF%E3%82%A8%E3%83%AA--%E3%82%AF%E3%83%AC%E3%82%B8%E3%83%83%E3%83%88%E6%B6%88%E8%B2%BB">テスト = SQLクエリ = クレジット消費</h2>
<p>全てのdbt testはSnowflake上でSELECTクエリとして実行される。テスト数が多いほど、ウェアハウスのコストが増える。</p>
<h2 id="%E3%82%B3%E3%82%B9%E3%83%88%E6%9C%80%E9%81%A9%E5%8C%96%E3%81%AE%E3%83%9D%E3%82%A4%E3%83%B3%E3%83%88">コスト最適化のポイント</h2>
<ul>
<li>テスト専用に小さいウェアハウス（X-SMALL）を用意する</li>
<li><code>dbt test --select tag:critical</code> で重要なテストだけ毎日実行し、全テストは週次にする</li>
<li><code>--select</code> で必要なテストだけ実行する習慣をつける</li>
</ul>
</section>

<h2 id="%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC%E3%81%94%E3%81%A8%E3%81%AE%E3%83%86%E3%82%B9%E3%83%88%E6%88%A6%E7%95%A5">レイヤーごとのテスト戦略</h2>

<h1 id="%E3%83%99%E3%82%B9%E3%83%88%E3%83%97%E3%83%A9%E3%82%AF%E3%83%86%E3%82%A3%E3%82%B9%E7%B6%9A%E3%81%8D">ベストプラクティス（続き）</h1>
<h2 id="cicd%E3%81%A7%E3%81%AE%E3%83%86%E3%82%B9%E3%83%88%E5%AE%9F%E8%A1%8C">CI/CDでのテスト実行</h2>
<p>PRごとにテストを実行し、失敗するPRはマージしない。</p>
<h2 id="severity%E3%81%AE%E4%BD%BF%E3%81%84%E5%88%86%E3%81%91">severityの使い分け</h2>
<ul>

<li><code>warn</code> — 把握しておきたいが、パイプラインは止めたくない問題</li>
</ul>
<h2 id="store_failures%E3%81%AE%E6%B4%BB%E7%94%A8">store_failuresの活用</h2>
<p>開発中は <code>store_failures: true</code> を有効にしておくと、失敗行を直接クエリしてデバッグできる。</p>

<header>dbt test 完全ガイド</header>
<h1 id="%E3%81%BE%E3%81%A8%E3%82%81">まとめ</h1>
<ul>
<li>dbt testは「失敗行を返すSELECT文」というシンプルな仕組み</li>
<li>3つのカテゴリ：Generic tests、Singular tests、Unit tests</li>
<li>組み込み4種（unique, not_null, accepted_values, relationships）で基本的なデータ品質をカバー</li>
<li>Singular testsで複雑なビジネスルールを自由に検証</li>
<li>Unit tests（v1.8〜）でSQLロジックを本番データなしで検証できる</li>
<li>dbt_utilsで実用的なテストを拡張できる</li>
<li>Snowflakeが強制しない制約を、dbt testが補完する</li>
<li>テストはコスト（クレジット）とのバランスを意識して運用する</li>
</ul>
</section>
